name: "napi-build-action"
author: "puniyu"
description: "构建node-addon"

inputs:
  esm:
    required: false
    type: boolean
    default: false
  target:
    required: true
    type: string
    description: target triple to install
  cwdDir:
    required: true
    type: string
    description: working directory
  outputDir:
    required: false
    type: string
    default: "dist"
    description: output directory

outputs:
  output-path:
    description: "build .node file path"
    value: ${{ steps.output.outputs.output-path }}

runs:
  using: "composite"
  steps:
    - name: Setup Rust
      uses: puniyu/setup-rust@main
      with:
        target: ${{ inputs.target }}
        save-cache: true
        prefix-key: "napi"

    - name: Setup Nodejs
      uses: puniyu/setup-node@main
      with:
        node-version: lts/*
        pnpm-version: latest

    - name: Setup Napi CLi
      shell: bash
      run: pnpm i -g @napi-rs/cli

    - name: Build
      shell: bash
      run: |
        if [ "${{ inputs.esm }}" = "true" ]; then
          napi build --platform --release --esm --cwd ${{ inputs.cwdDir }} --output-dir ${{ inputs.outputDir }}
        else
          napi build --platform --release --cwd ${{ inputs.cwdDir }} --output-dir ${{ inputs.outputDir }}
        fi

    - name: Output
      shell: bash
      id: output
      run: |
        ARTIFACT_FILE=$(find ${{ inputs.cwdDir }}/${{ inputs.outputDir }} -type f \( -name "*.node" -o -name "*.wasm" \) | head -1)
        if [ -n "$ARTIFACT_FILE" ]; then
          echo "output-path=$ARTIFACT_FILE" >> $GITHUB_OUTPUT
          echo "Found artifact: $ARTIFACT_FILE"
        else
          echo "❌ No .node or .wasm file found in ${{ inputs.cwdDir }}/${{ inputs.outputDir }}"
          exit 1
        fi
  

